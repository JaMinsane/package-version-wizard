name: Build and deploy production image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image coordinates
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          name="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"

          echo "image=${REGISTRY}/${owner}/${name}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.image }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Wait for registry propagation
        shell: bash
        run: sleep 15

      - name: Trigger Dokploy deployment
        shell: bash
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
        run: |
          if [[ -z "${DOKPLOY_URL}" || -z "${DOKPLOY_API_KEY}" || -z "${DOKPLOY_APPLICATION_ID}" ]]; then
            echo "Faltan secrets de Dokploy: DOKPLOY_URL, DOKPLOY_API_KEY o DOKPLOY_APPLICATION_ID."
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST \
            "${DOKPLOY_URL%/}/api/application.deploy" \
            -H "accept: application/json" \
            -H "content-type: application/json" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -d "{\"applicationId\":\"${DOKPLOY_APPLICATION_ID}\"}"
